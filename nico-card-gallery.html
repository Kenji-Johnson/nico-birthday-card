<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nico's Cards — Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:ital,wght@0,500;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --paper:#F7F1E4;
    --paper-dot: rgba(43,38,32,0.06);
    --card-white:#FFFFFF;
    --ink-dark:#2B2620;
    --ink-soft:#6B6255;
    --line:#E4DAC4;
    --red:#B91C1C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(var(--paper-dot) 1px, transparent 1px) 0 0/22px 22px, var(--paper);
    color:var(--ink-dark); font-family:'Inter',sans-serif; min-height:100vh; padding:28px 16px 60px;
  }
  .wrap{max-width:1080px;margin:0 auto;}
  header{text-align:center; margin-bottom:22px;}
  header h1{
    font-family:'Fraunces',serif; font-style:italic; font-weight:500;
    font-size:clamp(20px,5.2vw,32px); margin:0 0 8px; color:var(--ink-dark);
  }
  header p{margin:0; color:var(--ink-soft); font-size:15px;}

  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    border:none; border-radius:9px; padding:10px 16px; cursor:pointer; transition:transform .08s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-outline{ background:transparent; border:1.5px solid var(--ink-dark); color:var(--ink-dark); }
  .btn-dark{ background:var(--ink-dark); color:var(--paper); }
  .btn-danger{ background:transparent; border:1.5px solid var(--red); color:var(--red); }
  .btn-tertiary{
    background:transparent; border:none; color:var(--ink-soft);
    text-decoration:underline; text-underline-offset:3px; font-weight:500; padding:8px 4px;
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
  }
  .btn-tertiary svg{ width:14px; height:14px; flex-shrink:0; }
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  /* ---- login ---- */
  #loginPanel{ max-width:340px; margin:60px auto 0; background:var(--card-white); border-radius:14px; padding:30px 26px; box-shadow:0 10px 26px rgba(43,38,32,0.1); }
  #loginPanel h2{ font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:20px; margin:0 0 18px; text-align:center; }
  .field{margin-bottom:16px;}
  .field label{ display:block; font-weight:600; font-size:12.5px; text-transform:uppercase; letter-spacing:.02em; color:var(--ink-soft); margin-bottom:6px; }
  input[type=email], input[type=password]{
    width:100%; font-family:'Inter',sans-serif; font-size:15px; padding:11px 13px;
    border-radius:10px; border:1.5px solid var(--line); background:var(--card-white); color:var(--ink-dark);
  }
  input[type=email]:focus, input[type=password]:focus{ outline:none; border-color:var(--ink-dark); }
  #loginBtn{width:100%; margin-top:6px;}
  .login-error{ color:var(--red); font-size:13px; font-weight:600; margin-top:12px; text-align:center; }

  /* ---- gallery ---- */
  #galleryPanel{display:none;}
  .gallery-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
  .gallery-head h2{ font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:22px; margin:0; }
  .gallery-head-actions{display:flex; align-items:center; gap:8px;}
  .gallery-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:26px; }
  .card-tile{display:flex; flex-direction:column; gap:10px;}
  .card-tile canvas{ width:100%; height:auto; border-radius:12px; box-shadow:0 8px 20px rgba(43,38,32,0.1), 0 2px 5px rgba(43,38,32,0.07); }
  .tile-actions{display:flex; gap:8px;}
  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-soft); }
  .empty-state .big{ font-family:'Fraunces',serif; font-style:italic; font-size:20px; color:var(--ink-dark); margin-bottom:6px; }
  .loading{text-align:center; padding:40px; color:var(--ink-soft); font-size:14px;}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(43,38,32,0.45); display:none;
    align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal-backdrop.active{display:flex;}
  .modal-box{ background:var(--card-white); border-radius:14px; padding:26px; max-width:340px; width:100%; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
  .modal-box h3{ font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:20px; margin:0 0 10px; }
  .modal-box p{color:var(--ink-soft); font-size:14px; margin:0 0 20px;}
  .modal-actions{display:flex; gap:10px; justify-content:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Nico's Cards</h1>
    <p>Private gallery — only visible to you</p>
  </header>

  <div id="loginPanel">
    <h2>Sign in</h2>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" autocomplete="current-password" />
    </div>
    <button class="btn btn-dark" id="loginBtn">Sign in</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <section id="galleryPanel">
    <div class="gallery-head">
      <h2>Every message so far</h2>
      <div class="gallery-head-actions">
        <button class="btn-tertiary" id="refreshBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          Refresh
        </button>
        <button class="btn-tertiary" id="signOutBtn">Sign out</button>
      </div>
    </div>
    <div id="galleryBody"><div class="loading">Loading cards…</div></div>
  </section>
</div>

<div class="modal-backdrop" id="deleteModal">
  <div class="modal-box">
    <h3>Delete this card?</h3>
    <p id="deleteModalText">This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelDeleteBtn">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLm-sxbwN5nIaXAODwLoNMvNazXXdUp6s",
  authDomain: "nico-birthday.firebaseapp.com",
  projectId: "nico-birthday",
  storageBucket: "nico-birthday.firebasestorage.app",
  messagingSenderId: "1053081594029",
  appId: "1:1053081594029:web:3f424bd9f035d8620fbe24",
  measurementId: "G-ZYZMVS7YL4"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---------- auth ----------
const loginPanel = document.getElementById('loginPanel');
const galleryPanel = document.getElementById('galleryPanel');
const loginError = document.getElementById('loginError');

onAuthStateChanged(auth, (user)=>{
  if(user){
    loginPanel.style.display = 'none';
    galleryPanel.style.display = 'block';
    loadGallery();
  } else {
    loginPanel.style.display = 'block';
    galleryPanel.style.display = 'none';
  }
});

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  loginError.textContent = '';
  if(!email || !password){ loginError.textContent = 'Enter your email and password.'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try{
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e){
    loginError.textContent = 'Sign-in failed — check your email and password.';
  }
  btn.disabled = false; btn.textContent = 'Sign in';
});

document.getElementById('signOutBtn').addEventListener('click', ()=> signOut(auth));

// ---------- card rendering (shared by gallery + downloads) ----------
function seededRand(seed){ const x = Math.sin(seed*12.9898)*43758.5453; return x - Math.floor(x); }
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function addWavyEdge(ctx, sx,sy, ex,ey, amp, wavelength){
  const dx=ex-sx, dy=ey-sy;
  const len=Math.hypot(dx,dy);
  if(len<1) return;
  const ux=dx/len, uy=dy/len;
  const nx=-uy, ny=ux;
  let steps = Math.max(2, Math.round(len/wavelength));
  if(steps % 2 === 0) steps += 1;
  const stepLen = len/steps;
  let sign=1;
  for(let i=1;i<=steps;i++){
    const t = stepLen*i;
    const midT = t - stepLen/2;
    const jitter = (seededRand(i*7.13+sx+sy*3.1)-0.5)*amp*0.4;
    const cx = sx+ux*midT + nx*(amp*sign+jitter);
    const cy = sy+uy*midT + ny*(amp*sign+jitter);
    const ex2 = sx+ux*t, ey2 = sy+uy*t;
    ctx.quadraticCurveTo(cx,cy,ex2,ey2);
    sign*=-1;
  }
}
function drawWavyBorder(ctx,x0,y0,x1,y1,color,scale){
  const amp = 6.5*scale, wavelength = 26*scale;
  ctx.strokeStyle = color; ctx.lineWidth = 2.4*scale;
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x0,y0);
  addWavyEdge(ctx, x0,y0, x1,y0, amp, wavelength);
  addWavyEdge(ctx, x1,y0, x1,y1, amp, wavelength);
  addWavyEdge(ctx, x1,y1, x0,y1, amp, wavelength);
  addWavyEdge(ctx, x0,y1, x0,y0, amp, wavelength);
  ctx.closePath();
  ctx.stroke();
}
function wrapAroundIllustration(ctx, text, fullWidth, narrowWidth, illusTopY, lineHeight){
  const paragraphs = (text || '').split('\n');
  const lines = []; let y = 0;
  paragraphs.forEach(p=>{
    const words = p.split(' ');
    let line = '';
    words.forEach(w=>{
      const maxW = (y+lineHeight > illusTopY) ? narrowWidth : fullWidth;
      const test = line ? line+' '+w : w;
      if(ctx.measureText(test).width > maxW && line){
        lines.push(line); y += lineHeight; line = w;
      } else { line = test; }
    });
    lines.push(line); y += lineHeight;
  });
  return lines;
}
function fitMessage(ctx, text, fullWidth, narrowWidth, illusTopY, maxHeight, maxSize, minSize){
  let fontSize = maxSize, lines = [], lineHeight = fontSize*1.18;
  while(fontSize >= minSize){
    ctx.font = `700 ${fontSize}px 'Caveat', cursive`;
    lineHeight = fontSize*1.18;
    lines = wrapAroundIllustration(ctx, text, fullWidth, narrowWidth, illusTopY, lineHeight);
    if(lines.length*lineHeight <= maxHeight) break;
    fontSize -= 1;
  }
  return {fontSize, lines, lineHeight};
}
function loadImageCached(dataUrl){
  return new Promise((resolve)=>{
    if(!dataUrl){ resolve(null); return; }
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = dataUrl;
  });
}
async function renderCardToCanvas(canvas, card, scale){
  const W = 600*scale, H = 400*scale;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  roundRectPath(ctx,0,0,W,H,16*scale);
  ctx.fillStyle = '#FFFFFF'; ctx.fill();
  ctx.lineWidth = 1*scale; ctx.strokeStyle = '#EFE8D8'; ctx.stroke();

  const margin = 24*scale;
  drawWavyBorder(ctx, margin, margin, W-margin, H-margin, card.color, scale);

  const pad = 50*scale;
  const contentX = pad, contentY = pad;
  const contentW = W - 2*pad, contentH = H - 2*pad;

  let img = null, drawW = 0, drawH = 0;
  const hasIllustration = !!card.illustration;
  if(hasIllustration){
    img = card.__img || await loadImageCached(card.illustration);
    card.__img = img;
    if(img){
      const maxBox = 190*scale;
      const ratio = img.naturalWidth && img.naturalHeight ? img.naturalWidth/img.naturalHeight : 1;
      if(ratio >= 1){ drawW = maxBox; drawH = maxBox/ratio; }
      else { drawH = maxBox; drawW = maxBox*ratio; }
    }
  }
  const gap = img ? 16*scale : 0;
  const illusTopY = img ? (contentH - drawH) : contentH + 999;

  ctx.fillStyle = card.color;
  ctx.textBaseline = 'alphabetic';
  const reserve = 8*scale;
  const {fontSize, lines, lineHeight} = fitMessage(
    ctx, card.message, contentW, img ? (contentW - drawW - gap) : contentW,
    illusTopY, contentH - reserve, 30*scale, 12*scale
  );
  ctx.font = `700 ${fontSize}px 'Caveat', cursive`;
  let ty = contentY + fontSize;
  lines.forEach(line=>{ ctx.fillText(line, contentX, ty); ty += lineHeight; });

  const bottomY = contentY + contentH;
  ctx.font = `600 ${fontSize}px 'Caveat', cursive`;
  ctx.fillText(`— ${card.name}`, contentX, bottomY);

  if(img){
    const bx = contentX + contentW - drawW;
    const by = bottomY - drawH;
    ctx.drawImage(img, bx, by, drawW, drawH);
  }
}

// ---------- gallery data ----------
async function loadAllCards(){
  const q = query(collection(db, 'cards'), orderBy('createdAt', 'asc'));
  const snap = await getDocs(q);
  const cards = [];
  snap.forEach(d=>{
    const data = d.data();
    cards.push({
      id: d.id,
      color: data.color,
      name: data.name,
      message: data.message,
      illustration: data.illustration || null,
    });
  });
  return cards;
}
async function deleteCardById(id){
  await deleteDoc(doc(db, 'cards', id));
}

document.getElementById('refreshBtn').addEventListener('click', loadGallery);

let pendingDeleteId = null;
const deleteModal = document.getElementById('deleteModal');
const deleteModalText = document.getElementById('deleteModalText');
function openDeleteModal(card){
  pendingDeleteId = card.id;
  deleteModalText.textContent = `Delete ${card.name}'s message? This action cannot be undone.`;
  deleteModal.classList.add('active');
}
document.getElementById('cancelDeleteBtn').addEventListener('click', ()=>{
  pendingDeleteId = null;
  deleteModal.classList.remove('active');
});
document.getElementById('confirmDeleteBtn').addEventListener('click', async ()=>{
  if(!pendingDeleteId) return;
  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true; btn.textContent = 'Deleting…';
  try{ await deleteCardById(pendingDeleteId); } catch(e){ console.error('delete failed', e); }
  btn.disabled = false; btn.textContent = 'Delete';
  pendingDeleteId = null;
  deleteModal.classList.remove('active');
  loadGallery();
});

async function loadGallery(){
  const body = document.getElementById('galleryBody');
  body.innerHTML = '<div class="loading">Loading cards…</div>';
  let cards = [];
  try{
    cards = await loadAllCards();
  } catch(e){
    console.error('load failed', e);
    body.innerHTML = '<div class="empty-state"><div class="big">Couldn\'t load cards</div>Try refreshing.</div>';
    return;
  }

  if(cards.length === 0){
    body.innerHTML = `<div class="empty-state"><div class="big">No messages yet</div>Nobody has signed the card yet.</div>`;
    return;
  }

  body.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'gallery-grid';
  body.appendChild(grid);

  for(const card of cards.slice().reverse()){
    const tile = document.createElement('div');
    tile.className = 'card-tile';
    const canvas = document.createElement('canvas');
    tile.appendChild(canvas);

    const actions = document.createElement('div');
    actions.className = 'tile-actions';
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn btn-outline';
    dlBtn.textContent = 'Download PNG';
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete';
    actions.appendChild(dlBtn);
    actions.appendChild(delBtn);
    tile.appendChild(actions);
    grid.appendChild(tile);

    await renderCardToCanvas(canvas, card, 1.4);

    // Pre-render the high-res download image so the click handler stays
    // synchronous (awaiting inside a click handler can break the browser's
    // "user gesture" chain and silently block the download).
    dlBtn.disabled = true;
    dlBtn.textContent = 'Preparing…';
    const dl = document.createElement('canvas');
    await renderCardToCanvas(dl, card, 3);
    const hiResDataUrl = dl.toDataURL('image/png');
    dlBtn.disabled = false;
    dlBtn.textContent = 'Download PNG';

    dlBtn.addEventListener('click', ()=>{
      const link = document.createElement('a');
      const safeName = (card.name || 'friend').replace(/[^a-z0-9]/gi,'_').toLowerCase();
      link.download = `nico-card-${safeName}.png`;
      link.href = hiResDataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    delBtn.addEventListener('click', ()=>openDeleteModal(card));
  }
}
</script>
</body>
</html>
